<!DOCTYPE html>
<html lang="cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/values.css" />
    <script src = "js/jquary.js"></script>
    <script src = "js/jquery.cookie.min.js"></script>
    <script src = "js/submit.js"></script>
</head>
<body>
    <div class="windows">
        <h3>河北大学请假条生成器</h3>

         <div class="avatar-container">
            <div class="avatar-left">
                <label class="avatar-label">上传头像</label>
                <label for="avatarInput" class="avatar-upload-btn">选择图片</label>
                <input type="file" id="avatarInput" accept="image/png, image/jpeg, image/jpg" style="display:none;">
            </div>
            <div class="avatar-right">
                <img id="avatarPreview" src="" alt="头像预览">
            </div>
        </div>
        <div class="name inputItem">
            <div class = "content">姓名</div>
            <div>:</div>
            <input type="text">
        </div>
        <div class="academy inputItem">
            <div class = "content">学院</div>
            <div>:</div>
            <input type="text" id = "academy">
        </div>
        <div class="studentId inputItem">
            <div class = "content">学号</div>
            <div>:</div>
            <input type="text" id = "studentId">
        </div>
        <div class="start_term inputItem">
            <div class = "content">开始时间</div>
            <div>:</div>
            <input type="datetime-local" id="start_term" name="dateTimeInput" step="3600">
        </div>
        <div class="end_term inputItem">
            <div class = "content">结束时间</div>
            <div>:</div>
            <input type="datetime-local" id="end_term" name="dateTimeInput" step="3600">
        </div>
        <div class="issuance inputItem">
            <div class = "content">签发时间</div>
            <div>:</div>
            <!-- <input type="text" id = "issuance"> -->
            <input type="date" id="issuance">
        </div>
        <input type="button" value="提交" id = "submit">
        <input type="button" value="清空头像" id = "clearA">
        
    </div>
    
</body>
</html>
