<!DOCTYPE html>
<html lang="cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>假条</title>
    <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
    <div class="windows">
        <div class="head"></div>
        <div class="avatar"></div>
        <div class="detail">
            <div class="name content">
                <div class="title">姓名</div>
                <div class="colon">:</div>
                <div class="value">高**</div>
            </div>
            <div class="academy content">
                <div class="title">学院</div>
                <div class="colon">:</div>
                <div class="value">我也不知道叫啥的学院</div>
            </div>
            <div class="suidentId content">
                <div class="title">学号</div>
                <div class="colon">:</div>
                <div class="value">2025*******</div>
            </div>
            <div class="term content">
                <div class="title">请假期限</div>
                <div class="colon">:</div>
                <div class="value">2025年04月19日19时-2025年04月19日23时</div>
            </div>
            <div class="issuance content">
                <div class="title">签发时间</div>
                <div class="colon">:</div>
                <div class="value">2025年04月23日</div>
            </div>
        </div>
        <div class="tail"></div>
    </div>
    
</body>
</html>
