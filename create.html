<!DOCTYPE html>
<html lang="cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>假条</title>
    <link rel="stylesheet" href="./css/style.css" />
    <script src = "js/jquary.js"></script>
    <script src = "js/jquery.cookie.min.js"></script>
    <script src = "./js/create.js"></script>
</head>
<body>
    <div class="windows">
        <!-- <div class="head"></div> -->
        <img src="./images/head.png" class = "head" alt="">
        <!-- <img src="./images/avatar.png" class = "avatar" alt=""> -->
        <div class="avatar">
            <img src="./images/avatar.png"  alt="">
        </div>
        <div class="detail">
            <div class="name content">
                <div class="title">姓名</div>
                <div class="colon">: </div>
                 
                <div class="value"></div>
            </div>
            <div class="academy content">
                <div class="title">学院</div>
                <div class="colon">:</div>
                <div class="value"></div>
            </div>
            <div class="suidentId content">
                <div class="title">学号</div>
                <div class="colon">:</div>
                <div class="value"></div>
            </div>
            <div class="term content">
                <div class="title">请假期限</div>
                <div class="colon">:</div>
                <div class="value"></div>
   
            </div>
            <div class="issuance content">
                <div class="title">签发时间</div>
                <div class="colon">:</div>
                <div class="value"></div>
            </div>
        </div>
        <!-- <div class="tail"></div> -->
         <img src="./images/tail.png" class="tail" alt="">
    </div>
    
</body>
</html>
